<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1120" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.45" stop-color="#0B1E35"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(245 110) rotate(90) scale(200 300)">
      <stop stop-color="#30E3FF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#30E3FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 390) rotate(90) scale(170 260)">
      <stop stop-color="#7C5CFF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="200" y1="0" x2="1040" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1CE0FF" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#1CE0FF" stop-opacity="0.9"/>
      <stop offset="0.8" stop-color="#7C5CFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cubeFront" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16D9F0"/>
      <stop offset="1" stop-color="#0C8DC7"/>
    </linearGradient>
    <linearGradient id="cubeSide" x1="0" y1="0" x2="120" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B78B3"/>
      <stop offset="1" stop-color="#0A3E7E"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0" y1="0" x2="140" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#92F5FF"/>
      <stop offset="1" stop-color="#2BCBFF"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#030814" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="520" rx="32" fill="url(#glowA)"/>
  <rect width="1200" height="520" rx="32" fill="url(#glowB)"/>

  <g opacity="0.24">
    <path d="M120 106H1080" stroke="url(#line)" stroke-width="2"/>
    <path d="M90 168H1110" stroke="url(#line)" stroke-width="1.6"/>
    <path d="M140 352H1060" stroke="url(#line)" stroke-width="1.2"/>
    <path d="M200 414H1000" stroke="url(#line)" stroke-width="1.2"/>
  </g>

  <g opacity="0.15">
    <path d="M120 80L120 440" stroke="#56E7FF"/>
    <path d="M220 80L220 440" stroke="#56E7FF"/>
    <path d="M320 80L320 440" stroke="#56E7FF"/>
    <path d="M420 80L420 440" stroke="#56E7FF"/>
    <path d="M520 80L520 440" stroke="#56E7FF"/>
    <path d="M620 80L620 440" stroke="#56E7FF"/>
    <path d="M720 80L720 440" stroke="#56E7FF"/>
    <path d="M820 80L820 440" stroke="#56E7FF"/>
    <path d="M920 80L920 440" stroke="#56E7FF"/>
    <path d="M1020 80L1020 440" stroke="#56E7FF"/>
  </g>

  <g transform="translate(145 110)">
    <ellipse cx="125" cy="248" rx="150" ry="34" fill="#0B1221"/>
    <ellipse cx="125" cy="248" rx="116" ry="18" fill="#16D9F0" opacity="0.18" filter="url(#softGlow)"/>

    <g filter="url(#shadow)">
      <g>
        <animateTransform attributeName="transform" attributeType="XML" type="translate" values="0 0; 0 -10; 0 0" dur="4.8s" repeatCount="indefinite"/>
        <polygon points="125,18 234,78 125,138 16,78" fill="url(#cubeTop)"/>
        <polygon points="16,78 125,138 125,258 16,198" fill="url(#cubeFront)"/>
        <polygon points="125,138 234,78 234,198 125,258" fill="url(#cubeSide)"/>
        <path d="M125 18V138" stroke="#D9FDFF" stroke-opacity="0.72" stroke-width="3"/>
        <path d="M16 78L125 138L234 78" stroke="#D9FDFF" stroke-opacity="0.72" stroke-width="3"/>
        <path d="M16 198L125 258L234 198" stroke="#051325" stroke-opacity="0.35" stroke-width="2"/>
      </g>
    </g>

    <g opacity="0.75" filter="url(#softGlow)">
      <circle cx="248" cy="28" r="5" fill="#7C5CFF">
        <animate attributeName="cy" values="28;18;28" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-8" cy="68" r="4" fill="#1CE0FF">
        <animate attributeName="cy" values="68;54;68" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="260" cy="210" r="4" fill="#1CE0FF">
        <animate attributeName="cy" values="210;198;210" dur="3.6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <g transform="translate(472 136)">
    <rect x="0" y="0" width="585" height="248" rx="28" fill="#0A1628" fill-opacity="0.86" stroke="#2BE2FF" stroke-opacity="0.24"/>
    <rect x="24" y="24" width="150" height="34" rx="17" fill="#10243E"/>
    <text x="45" y="46" fill="#D7F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">FULL STACK DEVELOPER</text>

    <text x="24" y="112" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700">Sarthak Khatpe</text>
    <text x="24" y="154" fill="#8AB5D9" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="500">Spring Boot | React | Cloud Native | AI Apps</text>
    <text x="24" y="202" fill="#CDEFFF" font-family="Segoe UI, Arial, sans-serif" font-size="18">Building clean products, interactive interfaces, and scalable backend systems.</text>

    <g transform="translate(24 224)">
      <rect x="0" y="0" width="176" height="16" rx="8" fill="#10243E"/>
      <rect x="0" y="0" width="176" height="16" rx="8" fill="#1CE0FF" opacity="0.9">
        <animate attributeName="width" values="120;176;120" dur="4.2s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <g opacity="0.7">
    <circle cx="1010" cy="120" r="48" stroke="#2BE2FF" stroke-opacity="0.28" stroke-width="1.4">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 1010 120" to="360 1010 120" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1010" cy="120" r="24" fill="#122138"/>
    <circle cx="1010" cy="72" r="4" fill="#2BE2FF">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 1010 120" to="360 1010 120" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
